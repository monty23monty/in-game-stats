<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet"  type="text/css" href="/static/css/style.css">
    <meta name="game_id" content="{{ game_id }}">
</head>
<body>
<div class="header">
    <h1 class="h1 gold">Lightning TV Stats</h1>
</div>
<div class="container">
    <div id="left" class="inner">
        <div class="box-header">
            <div class="box-title">
                <h2>Game Info</h2>
            </div>
        </div>
        <div class="box-body">
            <div class="row-box">
                <p class="cell">{{ home_team }}</p>
            </div>
            <div class="row-box">
                <p class="cell">{{ guest_team }}</p>
            </div>

            <div class="row-box">
                <p class="cell">Game ID: {{ game_id }}</p>
            </div>
        </div>

    </div>
    <div id="center" class="inner">
        <div class="box-header">
            <div class="box-title">
                <h2>Player Selection</h2>
            </div>
        </div>
        <div class="box-body">
            <div class="row-box">
                <select id="team-select" class="cell">
                    <option value="{{ home_team_id }}" >{{ home_team }}</option>
                    <option value="{{ guest_team_id }}">{{ guest_team }}</option>
                </select>
            </div>
            <div class="row-box">
                <select id="player-select" class="cell">

                </select>
            </div>
            <div class="row-box">
                <p class="cell" id="name">Name: </p>
            </div>
            <div class="row-box"></div>
            <div class="row-box"></div>
            <div class="row-box" id="Game-Season-toggle">
                <p>Season Stats </p>
                <div class="toggle-container">
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <p>Game Stats</p>
            </div>
            <div class="row-box"></div>
            <div class="row-box">
                <button class="cell" id="player-send-button">Send</button>
            </div>
            <div class="row-box">
                <button class="cell" onclick="SetPlayers()">Refresh players</button>
            </div>
        </div>
    </div>
    <div id="right" class="inner"></div>
</div>
<script src="/static/js/script.js"></script>
</body>
</html>
